<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malicious URL Detector</title>
    <style>
        body {
            width: 250px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: #f8f9fa;
            color: #333;
            text-align: center;
        }
        .status-container {
            padding: 10px;
            border-radius: 8px;
            background-color: #e6f4ea;
            border: 1px solid #ceead6;
            margin-bottom: 10px;
        }
        .status-text {
            font-size: 16px;
            font-weight: 600;
            color: #137333;
        }
        .status-icon {
            font-size: 24px;
            margin-bottom: 5px;
        }
        .info-text {
            font-size: 12px;
            color: #666;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="status-container">
        <div class="status-icon">🛡️</div>
        <div class="status-text">Extension Active</div>
    </div>
    <div class="info-text">
        Background protection is scanning links in real-time.
    </div>

    <!-- Link the JavaScript file -->
    <script src="popup.js"></script>
</body>
</html>
